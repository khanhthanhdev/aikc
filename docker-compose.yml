name: aikc-local

x-app-environment: &app-environment
  NODE_ENV: "production"
  PORT: "5175"
  AUTH_URL: "${COMPOSE_SITE_URL:-https://aikc.vn}"
  NEXTAUTH_URL: "${COMPOSE_SITE_URL:-https://aikc.vn}"
  DATABASE_URL: "postgresql://${POSTGRES_USER:-aikc}:${POSTGRES_PASSWORD:-aikc}@postgres:5432/${POSTGRES_DB:-aikc}?schema=public"
  DATABASE_URL_UNPOOLED: "postgresql://${POSTGRES_USER:-aikc}:${POSTGRES_PASSWORD:-aikc}@postgres:5432/${POSTGRES_DB:-aikc}?schema=public"
  USE_LOCAL_EMBEDDING: "${USE_LOCAL_EMBEDDING:-true}"
  INFINITY_EMBEDDING_URL: "http://infinity:7997"
  INFINITY_EMBEDDING_MODEL: "${INFINITY_MODEL_ID:-sentence-transformers/all-MiniLM-L6-v2}"
  INFINITY_EMBEDDING_DIMENSIONS: "${INFINITY_EMBEDDING_DIMENSIONS:-384}"
  NEXT_PUBLIC_SITE_URL: "${COMPOSE_SITE_URL:-http://localhost}"
  NEXT_PUBLIC_SITE_EMAIL: "${COMPOSE_SITE_EMAIL:-hello@example.com}"
  AUTH_SECRET: "${AUTH_SECRET:-local-auth-secret}"
  AUTH_GOOGLE_ID: "${AUTH_GOOGLE_ID:-local-google-id}"
  AUTH_GOOGLE_SECRET: "${AUTH_GOOGLE_SECRET:-local-google-secret}"
  SCREENSHOTONE_ACCESS_KEY: "${SCREENSHOTONE_ACCESS_KEY:-local-screenshotone-access-key}"
  OPENAI_API_KEY: "${OPENAI_API_KEY:-local-openai-api-key}"
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-local-anthropic-api-key}"
  GEMINI_API_KEY: "${GEMINI_API_KEY:-local-gemini-api-key}"
  FIRECRAWL_API_KEY: "${FIRECRAWL_API_KEY:-local-firecrawl-api-key}"
  RESEND_API_KEY: "${RESEND_API_KEY:-local-resend-api-key}"
  S3_BUCKET: "${S3_BUCKET:-local-bucket}"
  S3_REGION: "${S3_REGION:-us-east-1}"
  S3_ACCESS_KEY: "${S3_ACCESS_KEY:-local-s3-access-key}"
  S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-local-s3-secret-access-key}"
  QDRANT_URL: "http://qdrant:6333"
  QDRANT_API_KEY: "${QDRANT_API_KEY:-local-qdrant-api-key}"
  RAG_ENABLED: "${RAG_ENABLED:-true}"
  PUBLISH_SUBMITTER_EMAILS: "${PUBLISH_SUBMITTER_EMAILS:-true}"
  INNGEST_EVENT_KEY: "${INNGEST_EVENT_KEY:-local-inngest-event-key}"
  INNGEST_SIGNING_KEY: "${INNGEST_SIGNING_KEY:-deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef}"
  INNGEST_DEV: "0"
  INNGEST_BASE_URL: "http://inngest:8288"

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-aikc}"
      POSTGRES_USER: "${POSTGRES_USER:-aikc}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-aikc}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./docker/postgres/scripts:/opt/postgres/scripts:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-aikc} -d ${POSTGRES_DB:-aikc}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  pg-tools:
    profiles: ["ops"]
    build:
      context: ./docker/pg-tools
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["sh", "-ec"]

  qdrant:
    image: qdrant/qdrant:v1.16.1
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  infinity:
    image: michaelf34/infinity:latest-cpu
    restart: unless-stopped
    command:
      - v2
      - --engine
      - "${INFINITY_ENGINE:-torch}"
      - --model-id
      - "${INFINITY_MODEL_ID:-sentence-transformers/all-MiniLM-L6-v2}"
      - --port
      - "7997"
    ports:
      - "${INFINITY_PORT:-7997}:7997"
    volumes:
      - infinity_cache:/app/.cache

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        NEXT_PUBLIC_SITE_URL: "${COMPOSE_SITE_URL:-http://localhost}"
        NEXT_PUBLIC_SITE_EMAIL: "${COMPOSE_SITE_EMAIL:-hello@example.com}"
    user: "0:0"
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-ec", "bunx prisma db push --skip-generate"]
    restart: "no"

  # Performs `next build` against the live postgres service. Cannot run during
  # `docker build` because cacheComponents requires DB-backed
  # generateStaticParams to return non-empty results.
  build:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        NEXT_PUBLIC_SITE_URL: "${COMPOSE_SITE_URL:-http://localhost}"
        NEXT_PUBLIC_SITE_EMAIL: "${COMPOSE_SITE_EMAIL:-hello@example.com}"
    environment: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["bun", "run", "build"]
    volumes:
      - app_next:/app/.next
    restart: "no"

  qdrant-setup:
    profiles: ["setup"]
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: ["bun", "run", "scripts/setup-qdrant.ts", "--force"]
    restart: "no"

  inngest:
    image: inngest/inngest
    command: "inngest start"
    restart: unless-stopped
    # Security: bind to localhost only — dashboard is accessed via Caddy with Basic Auth
    ports:
      - "127.0.0.1:${INNGEST_PORT:-8288}:8288"
    environment:
      INNGEST_EVENT_KEY: "${INNGEST_EVENT_KEY:-local-inngest-event-key}"
      INNGEST_SIGNING_KEY: "${INNGEST_SIGNING_KEY:-deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef}"
      INNGEST_POLL_INTERVAL: "5"
      INNGEST_SDK_URL: "http://app:5175/api/inngest"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8288/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        NEXT_PUBLIC_SITE_URL: "${COMPOSE_SITE_URL:-http://localhost}"
        NEXT_PUBLIC_SITE_EMAIL: "${COMPOSE_SITE_EMAIL:-hello@example.com}"

    restart: unless-stopped
    environment: *app-environment
    depends_on:
      build:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
      inngest:
        condition: service_healthy
    volumes:
      # Built artifacts produced by the `build` service. Mounting the same
      # named volume here makes `next start` find the `.next` output created
      # against the live database.
      - app_next:/app/.next
      # Persist Next.js runtime caches used by ISR/PPR/cacheComponents between
      # container restarts on a single-node VPS deployment.
      - app_next_cache:/app/.next/cache

  postgrest:
    image: postgrest/postgrest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: "postgres://${POSTGRES_USER:-aikc}:${POSTGRES_PASSWORD:-aikc}@postgres:5432/${POSTGRES_DB:-aikc}"
      PGRST_DB_SCHEMA: "${PGRST_DB_SCHEMA:-public}"
      PGRST_DB_ANON_ROLE: "${PGRST_DB_ANON_ROLE:-web_anon}"
      PGRST_SERVER_PORT: "3000"
      PGRST_OPENAPI_SERVER_PROXY_URI: "${COMPOSE_POSTGREST_URL:-http://localhost/postgrest}"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      infinity:
        condition: service_started
      postgrest:
        condition: service_started
      qdrant:
        condition: service_started
      inngest:
        condition: service_healthy
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  app_next:
  app_next_cache:
  postgres_data:
  qdrant_data:
  infinity_cache:
  caddy_data:
  caddy_config:
